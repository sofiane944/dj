<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Vote - Invité</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000000;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(29, 185, 84, 0.3); }
            50% { box-shadow: 0 0 40px rgba(29, 185, 84, 0.6); }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bounce-anim {
            animation: bounce 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA6EwZSO7OZVYbrJBJdFntoIteKTfXARSE",
            authDomain: "dj-vote.firebaseapp.com",
            databaseURL: "https://dj-vote-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dj-vote",
            storageBucket: "dj-vote.firebasestorage.app",
            messagingSenderId: "587965580446",
            appId: "1:587965580446:web:837a8b404547e44ea1278f"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Music = () => (
            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
        );

        const Check = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
            </svg>
        );

        const Plus = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const Search = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        );

        const GuestApp = () => {
            const [partyCode, setPartyCode] = useState('');
            const [isConnected, setIsConnected] = useState(false);
            const [partyData, setPartyData] = useState(null);
            const [songs, setSongs] = useState([]);
            const [votedSongs, setVotedSongs] = useState(new Set());
            const [filter, setFilter] = useState('all');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [voteCapital, setVoteCapital] = useState(0); // Capital de votes disponibles
            const [totalVoteCapital, setTotalVoteCapital] = useState(0); // Capital total initial
            const [hasUnlimitedVotes, setHasUnlimitedVotes] = useState(false); // VIP 5€
            const [showBuyVotes, setShowBuyVotes] = useState(false); // Modal d'achat de votes
            
            // Nouveaux états pour l'ajout de chanson
            const [showAddSong, setShowAddSong] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [searching, setSearching] = useState(false);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const codeFromUrl = urlParams.get('code');
                
                if (codeFromUrl) {
                    setPartyCode(codeFromUrl);
                    joinParty(codeFromUrl);
                } else {
                    const savedCode = localStorage.getItem('current-party-code');
                    if (savedCode) {
                        setPartyCode(savedCode);
                        joinParty(savedCode);
                    }
                }
            }, []);

            const joinParty = async (code) => {
                setLoading(true);
                setError('');
                
                try {
                    const snapshot = await firebase.database().ref(`parties/${code}`).once('value');
                    
                    if (!snapshot.exists()) {
                        setError('Code de soirée invalide');
                        setLoading(false);
                        return;
                    }

                    const data = snapshot.val();
                    setPartyData(data);
                    setSongs(data.songs || []);
                    setPartyCode(code);
                    setIsConnected(true);
                    localStorage.setItem('current-party-code', code);

                    // Initialiser le capital de votes = nombre de chansons
                    const totalCapital = (data.songs || []).length;
                    setTotalVoteCapital(totalCapital);

                    firebase.database().ref(`parties/${code}`).on('value', (snapshot) => {
                        const updated = snapshot.val();
                        if (updated) {
                            setPartyData(updated);
                            setSongs(updated.songs || []);
                            // Mettre à jour le capital total si des chansons sont ajoutées
                            setTotalVoteCapital((updated.songs || []).length);
                        }
                    });

                    const userVotesKey = `user-votes:${code}`;
                    const userVotes = localStorage.getItem(userVotesKey);
                    const vipStatus = localStorage.getItem(`user-vip:${code}`);
                    
                    if (vipStatus === 'true') {
                        setHasUnlimitedVotes(true);
                        setVoteCapital(999999); // Votes illimités
                    } else if (userVotes) {
                        const votedSet = new Set(JSON.parse(userVotes));
                        setVotedSongs(votedSet);
                        // Calculer le capital restant
                        const savedCapital = localStorage.getItem(`user-capital:${code}`);
                        if (savedCapital) {
                            setVoteCapital(parseInt(savedCapital));
                        } else {
                            setVoteCapital(totalCapital - votedSet.size);
                        }
                    } else {
                        setVoteCapital(totalCapital);
                    }
                } catch (error) {
                    setError('Erreur de connexion');
                    console.error(error);
                }
                
                setLoading(false);
            };

            const handleVote = async (songId) => {
                // Vérifier si déjà voté pour cette chanson
                if (votedSongs.has(songId)) return;

                // Vérifier le capital de votes (sauf si VIP)
                if (!hasUnlimitedVotes && voteCapital <= 0) {
                    // Proposer d'acheter des votes
                    setShowBuyVotes(true);
                    return;
                }

                const updatedSongs = songs.map(song => 
                    song.id === songId ? { ...song, votes: song.votes + 1 } : song
                );

                const newTotalVotes = (partyData.totalVotes || 0) + 1;

                try {
                    await firebase.database().ref(`parties/${partyCode}`).update({
                        songs: updatedSongs,
                        totalVotes: newTotalVotes
                    });

                    const newVotedSongs = new Set(votedSongs);
                    newVotedSongs.add(songId);
                    setVotedSongs(newVotedSongs);
                    
                    // Décrémenter le capital (sauf si VIP)
                    if (!hasUnlimitedVotes) {
                        const newCapital = voteCapital - 1;
                        setVoteCapital(newCapital);
                        localStorage.setItem(`user-capital:${partyCode}`, newCapital.toString());
                    }
                    
                    localStorage.setItem(`user-votes:${partyCode}`, JSON.stringify([...newVotedSongs]));
                } catch (error) {
                    console.error('Erreur vote:', error);
                    alert('Erreur lors du vote. Réessaye !');
                }
            };

            // Recherche Spotify (simulation avec une liste prédéfinie)
            const searchSpotify = (query) => {
                if (!query || query.length < 2) {
                    setSearchResults([]);
                    return;
                }

                setSearching(true);

                // Simulation de recherche Spotify avec des chansons populaires
                const allSongs = [
                    { id: 'sp1', title: "Espresso", artist: "Sabrina Carpenter", genre: "Pop" },
                    { id: 'sp2', title: "Beautiful Things", artist: "Benson Boone", genre: "Pop" },
                    { id: 'sp3', title: "Houdini", artist: "Dua Lipa", genre: "Pop" },
                    { id: 'sp4', title: "Cruel Summer", artist: "Taylor Swift", genre: "Pop" },
                    { id: 'sp5', title: "Paint The Town Red", artist: "Doja Cat", genre: "Hip-Hop" },
                    { id: 'sp6', title: "Vampire", artist: "Olivia Rodrigo", genre: "Pop Rock" },
                    { id: 'sp7', title: "Calm Down", artist: "Rema & Selena Gomez", genre: "Afrobeats" },
                    { id: 'sp8', title: "Flowers", artist: "Miley Cyrus", genre: "Pop" },
                    { id: 'sp9', title: "As It Was", artist: "Harry Styles", genre: "Pop" },
                    { id: 'sp10', title: "Anti-Hero", artist: "Taylor Swift", genre: "Pop" },
                    { id: 'sp11', title: "Dance The Night", artist: "Dua Lipa", genre: "Pop" },
                    { id: 'sp12', title: "Stick Season", artist: "Noah Kahan", genre: "Folk" },
                    { id: 'sp13', title: "Greedy", artist: "Tate McRae", genre: "Pop" },
                    { id: 'sp14', title: "Lose Control", artist: "Teddy Swims", genre: "Soul" },
                    { id: 'sp15', title: "Too Sweet", artist: "Hozier", genre: "Indie" },
                ];

                const results = allSongs.filter(song => 
                    song.title.toLowerCase().includes(query.toLowerCase()) ||
                    song.artist.toLowerCase().includes(query.toLowerCase())
                );

                setTimeout(() => {
                    setSearchResults(results);
                    setSearching(false);
                }, 500);
            };

            // Simuler le paiement et ajouter la chanson en attente
            const handleAddSong = async (song) => {
                // Simulation de paiement
                const confirmed = confirm(`💳 Payer 1€ pour ajouter "${song.title}" de ${song.artist} ?\n\n(Simulation de paiement)`);
                
                if (!confirmed) return;

                try {
                    // Générer un ID unique pour la demande
                    const requestId = `req_${Date.now()}`;
                    
                    // Ajouter la chanson dans la liste "pending" (en attente)
                    const pendingSongs = partyData.pendingSongs || [];
                    const newPendingSong = {
                        ...song,
                        requestId: requestId,
                        requestedBy: `Invité_${Math.random().toString(36).substr(2, 6)}`,
                        requestedAt: new Date().toISOString(),
                        price: 1,
                        status: 'pending'
                    };

                    pendingSongs.push(newPendingSong);

                    await firebase.database().ref(`parties/${partyCode}`).update({
                        pendingSongs: pendingSongs,
                        totalEarnings: (partyData.totalEarnings || 0) + 1
                    });

                    alert('✅ Paiement simulé avec succès !\nTa chanson est en attente de validation par le DJ.');
                    setShowAddSong(false);
                    setSearchQuery('');
                    setSearchResults([]);
                } catch (error) {
                    console.error('Erreur:', error);
                    alert('❌ Erreur lors de l\'ajout. Réessaye !');
                }
            };

            // Acheter des packs de votes
            const buyVotesPack = async (packType) => {
                let price, votesAdded, message;
                
                if (packType === 'pack10') {
                    price = 1;
                    votesAdded = 10;
                    message = `💳 Payer 1€ pour 10 votes supplémentaires ?\n\n(Simulation de paiement)`;
                } else if (packType === 'unlimited') {
                    price = 5;
                    votesAdded = 'unlimited';
                    message = `💎 Payer 5€ pour des votes ILLIMITÉS ?\n\n(Simulation de paiement)\n\nTu pourras voter autant que tu veux !`;
                }
                
                const confirmed = confirm(message);
                if (!confirmed) return;

                try {
                    if (packType === 'unlimited') {
                        // Activer le mode VIP
                        setHasUnlimitedVotes(true);
                        setVoteCapital(999999);
                        localStorage.setItem(`user-vip:${partyCode}`, 'true');
                        alert('🎉 Votes illimités activés !\n\nTu peux maintenant voter autant que tu veux !');
                    } else {
                        // Ajouter 10 votes
                        const newCapital = voteCapital + votesAdded;
                        setVoteCapital(newCapital);
                        localStorage.setItem(`user-capital:${partyCode}`, newCapital.toString());
                        alert(`✅ +10 votes ajoutés !\n\nTu as maintenant ${newCapital} votes disponibles.`);
                    }

                    // Incrémenter les gains du DJ
                    await firebase.database().ref(`parties/${partyCode}/totalEarnings`).transaction((current) => {
                        return (current || 0) + price;
                    });

                    setShowBuyVotes(false);
                } catch (error) {
                    console.error('Erreur:', error);
                    alert('❌ Erreur lors de l\'achat. Réessaye !');
                }
            };

            const disconnect = () => {
                firebase.database().ref(`parties/${partyCode}`).off();
                setIsConnected(false);
                setPartyCode('');
                setPartyData(null);
                setSongs([]);
                setVotedSongs(new Set());
                localStorage.removeItem('current-party-code');
            };

            const calculateProbability = (votes) => {
                const total = partyData?.totalVotes || 0;
                if (total === 0) return 0;
                return ((votes / total) * 100).toFixed(1);
            };

            const sortedSongs = [...songs].sort((a, b) => b.votes - a.votes);
            const genres = ['all', ...new Set(songs.map(s => s.genre))];
            const filteredSongs = filter === 'all' ? sortedSongs : sortedSongs.filter(s => s.genre === filter);

            // Écran de connexion
            if (!isConnected) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-6">
                        <div className="max-w-md w-full">
                            <div className="text-center mb-8">
                                <div className="inline-flex bg-gradient-to-br from-green-400 to-green-600 p-6 rounded-3xl shadow-2xl mb-6 bounce-anim">
                                    <Music />
                                </div>
                                <h1 className="text-4xl font-black text-white mb-2">DJ Vote</h1>
                                <p className="text-gray-400">Entre le code de la soirée pour voter</p>
                            </div>

                            <div className="bg-gray-900 rounded-2xl p-8 border border-gray-800">
                                <input
                                    type="text"
                                    placeholder="CODE SOIRÉE"
                                    value={partyCode}
                                    onChange={(e) => setPartyCode(e.target.value.toUpperCase())}
                                    className="w-full bg-gray-800 text-white text-center text-2xl font-bold px-6 py-4 rounded-xl border-2 border-gray-700 focus:border-green-500 focus:outline-none mb-4 uppercase tracking-widest"
                                    maxLength="6"
                                />

                                {error && (
                                    <div className="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-lg mb-4 text-sm">
                                        {error}
                                    </div>
                                )}

                                <button
                                    onClick={() => joinParty(partyCode)}
                                    disabled={loading || partyCode.length < 4}
                                    className="w-full bg-green-500 text-black font-bold py-4 rounded-xl hover:bg-green-400 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    {loading ? 'Connexion...' : 'Rejoindre la soirée'}
                                </button>

                                <p className="text-gray-500 text-xs text-center mt-4">
                                    Scanne le QR code ou demande le code au DJ
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // Écran de vote
            return (
                <div className="min-h-screen bg-black">
                    {/* Header */}
                    <div className="bg-gradient-to-b from-green-900 to-black pt-6 pb-4 px-6 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <p className="text-xs text-gray-400 mb-1">Soirée</p>
                                    <h1 className="text-2xl font-black text-white">{partyData?.name || 'DJ Vote'}</h1>
                                </div>
                                <button
                                    onClick={disconnect}
                                    className="bg-gray-800 text-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-700"
                                >
                                    Quitter
                                </button>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div className={`rounded-lg p-3 border ${hasUnlimitedVotes ? 'bg-gradient-to-r from-yellow-500/20 to-purple-500/20 border-yellow-500' : 'bg-gray-900/50 border-gray-800'}`}>
                                    <div className="text-xs text-gray-400 mb-1">
                                        {hasUnlimitedVotes ? '💎 Votes illimités' : 'Votes restants'}
                                    </div>
                                    <div className={`text-2xl font-bold ${hasUnlimitedVotes ? 'text-yellow-400' : voteCapital > 5 ? 'text-green-400' : voteCapital > 0 ? 'text-yellow-400' : 'text-red-400'}`}>
                                        {hasUnlimitedVotes ? '∞' : `${voteCapital} / ${totalVoteCapital}`}
                                    </div>
                                </div>
                                <div className="bg-gray-900/50 rounded-lg p-3 border border-gray-800">
                                    <div className="text-xs text-gray-400 mb-1">Tes votes</div>
                                    <div className="text-2xl font-bold text-white">{votedSongs.size}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 pb-12 pt-6">
                        {/* Boutons d'action */}
                        <div className="grid grid-cols-1 gap-3 mb-6">
                            {/* Bouton Acheter des votes (affiché si pas VIP et votes faibles) */}
                            {!hasUnlimitedVotes && voteCapital < 5 && (
                                <button
                                    onClick={() => setShowBuyVotes(true)}
                                    className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 rounded-xl hover:from-purple-400 hover:to-pink-400 transition-all flex items-center justify-center gap-2 shadow-lg"
                                >
                                    💎 Acheter des votes
                                </button>
                            )}
                            
                            {/* Bouton Ajouter une chanson */}
                            <button
                                onClick={() => setShowAddSong(true)}
                                className="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-bold py-3 rounded-xl hover:from-yellow-400 hover:to-orange-400 transition-all flex items-center justify-center gap-2 shadow-lg"
                            >
                                <Plus />
                                Ajouter ta chanson (1€)
                            </button>
                        </div>

                        {/* Filtres */}
                        <div className="mb-6 flex flex-wrap gap-2">
                            {genres.map(genre => (
                                <button
                                    key={genre}
                                    onClick={() => setFilter(genre)}
                                    className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${
                                        filter === genre
                                            ? 'bg-green-500 text-black'
                                            : 'bg-gray-900 text-white border border-gray-800'
                                    }`}
                                >
                                    {genre === 'all' ? 'Tous' : genre}
                                </button>
                            ))}
                        </div>

                        {/* Liste des chansons */}
                        <div className="space-y-2">
                            {filteredSongs.map((song, index) => {
                                const probability = calculateProbability(song.votes);
                                const hasVoted = votedSongs.has(song.id);
                                const isTop3 = index < 3;
                                
                                return (
                                    <div
                                        key={song.id}
                                        className={`bg-gray-900/30 rounded-lg p-4 transition-all hover:bg-gray-800/50 ${
                                            isTop3 ? 'border border-green-500/30' : 'border border-gray-900'
                                        }`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className="flex-shrink-0 w-6 text-center">
                                                <div className={`text-sm font-bold ${
                                                    isTop3 ? 'text-green-400' : 'text-gray-500'
                                                }`}>
                                                    {index + 1}
                                                </div>
                                            </div>

                                            <div className={`flex-shrink-0 w-10 h-10 rounded flex items-center justify-center font-bold ${
                                                isTop3 ? 'bg-green-500 text-black' : 'bg-gray-800 text-gray-600'
                                            }`}>
                                                {song.title.charAt(0)}
                                            </div>

                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-sm font-semibold text-white truncate">
                                                    {song.title}
                                                </h3>
                                                <p className="text-xs text-gray-400 truncate">{song.artist}</p>
                                            </div>

                                            <div className="flex items-center gap-3">
                                                <div className="text-right">
                                                    <div className="text-lg font-bold text-white">{song.votes}</div>
                                                    <div className="text-xs text-gray-500">{probability}%</div>
                                                </div>

                                                <button
                                                    onClick={() => handleVote(song.id)}
                                                    disabled={hasVoted}
                                                    className={`px-5 py-2 rounded-full text-sm font-bold transition-all ${
                                                        hasVoted
                                                            ? 'bg-gray-800 text-gray-500 cursor-not-allowed'
                                                            : hasUnlimitedVotes || voteCapital > 0
                                                            ? 'bg-green-500 text-black hover:bg-green-400 active:scale-95'
                                                            : 'bg-orange-500 text-black hover:bg-orange-400 active:scale-95'
                                                    }`}
                                                >
                                                    {hasVoted ? <Check /> : 'Vote'}
                                                </button>
                                            </div>
                                        </div>

                                        {song.votes > 0 && (
                                            <div className="mt-3 bg-gray-800 rounded-full h-1 overflow-hidden">
                                                <div
                                                    className="bg-green-500 h-full transition-all duration-700"
                                                    style={{ width: `${Math.min(probability * 2, 100)}%` }}
                                                />
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Modal Acheter des votes */}
                    {showBuyVotes && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6" onClick={() => setShowBuyVotes(false)}>
                            <div className="bg-gray-900 rounded-2xl p-6 max-w-md w-full border border-gray-800" onClick={(e) => e.stopPropagation()}>
                                <h2 className="text-2xl font-black text-white mb-2">💎 Acheter des votes</h2>
                                <p className="text-gray-400 text-sm mb-6">Choisis ton pack de votes</p>
                                
                                <div className="space-y-4">
                                    {/* Pack 10 votes */}
                                    <button
                                        onClick={() => buyVotesPack('pack10')}
                                        className="w-full bg-gradient-to-r from-blue-500 to-cyan-500 rounded-xl p-6 hover:from-blue-400 hover:to-cyan-400 transition-all text-left"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div className="text-2xl font-black text-white mb-1">Pack 10 votes</div>
                                                <div className="text-cyan-200 text-sm">+10 votes supplémentaires</div>
                                            </div>
                                            <div className="text-3xl font-black text-white">1€</div>
                                        </div>
                                    </button>

                                    {/* Pack illimité */}
                                    <button
                                        onClick={() => buyVotesPack('unlimited')}
                                        className="w-full bg-gradient-to-r from-yellow-500 to-pink-500 rounded-xl p-6 hover:from-yellow-400 hover:to-pink-400 transition-all text-left relative overflow-hidden"
                                    >
                                        <div className="absolute top-2 right-2 bg-white text-pink-600 text-xs font-black px-3 py-1 rounded-full">
                                            VIP
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div className="text-2xl font-black text-white mb-1">Votes illimités</div>
                                                <div className="text-yellow-200 text-sm">Vote autant que tu veux ! 🔥</div>
                                            </div>
                                            <div className="text-3xl font-black text-white">5€</div>
                                        </div>
                                    </button>
                                </div>

                                <button
                                    onClick={() => setShowBuyVotes(false)}
                                    className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl mt-6 hover:bg-gray-700 transition-all"
                                >
                                    Fermer
                                </button>

                                <p className="text-gray-500 text-xs text-center mt-4">
                                    💰 Les gains vont au DJ de la soirée
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Modal Ajouter une chanson */}
                    {showAddSong && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6" onClick={() => setShowAddSong(false)}>
                            <div className="bg-gray-900 rounded-2xl p-6 max-w-md w-full border border-gray-800" onClick={(e) => e.stopPropagation()}>
                                <h2 className="text-2xl font-black text-white mb-4">🎵 Ajouter une chanson</h2>
                                <p className="text-gray-400 text-sm mb-4">Recherche et ajoute ta chanson pour 1€</p>
                                
                                {/* Barre de recherche */}
                                <div className="relative mb-4">
                                    <Search className="absolute left-3 top-3.5 text-gray-500" />
                                    <input
                                        type="text"
                                        placeholder="Rechercher une chanson..."
                                        value={searchQuery}
                                        onChange={(e) => {
                                            setSearchQuery(e.target.value);
                                            searchSpotify(e.target.value);
                                        }}
                                        className="w-full bg-gray-800 text-white pl-10 pr-4 py-3 rounded-xl border-2 border-gray-700 focus:border-green-500 focus:outline-none"
                                    />
                                </div>

                                {/* Résultats de recherche */}
                                <div className="max-h-96 overflow-y-auto space-y-2">
                                    {searching && (
                                        <div className="text-center py-8 text-gray-500">
                                            Recherche en cours...
                                        </div>
                                    )}
                                    
                                    {!searching && searchResults.length === 0 && searchQuery.length > 0 && (
                                        <div className="text-center py-8 text-gray-500">
                                            Aucun résultat trouvé
                                        </div>
                                    )}
                                    
                                    {!searching && searchResults.map(song => (
                                        <div key={song.id} className="bg-gray-800 rounded-lg p-4 hover:bg-gray-700 transition-all">
                                            <div className="flex items-center justify-between">
                                                <div className="flex-1 min-w-0">
                                                    <h3 className="text-white font-semibold truncate">{song.title}</h3>
                                                    <p className="text-gray-400 text-sm truncate">{song.artist}</p>
                                                </div>
                                                <button
                                                    onClick={() => handleAddSong(song)}
                                                    className="bg-gradient-to-r from-yellow-500 to-orange-500 text-black px-4 py-2 rounded-lg font-bold hover:from-yellow-400 hover:to-orange-400 transition-all ml-3"
                                                >
                                                    1€
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={() => setShowAddSong(false)}
                                    className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl mt-4 hover:bg-gray-700 transition-all"
                                >
                                    Fermer
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GuestApp />);
    </script>
</body>
</html>
