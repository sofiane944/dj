<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Vote - Invité</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000000;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(29, 185, 84, 0.3); }
            50% { box-shadow: 0 0 40px rgba(29, 185, 84, 0.6); }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bounce-anim {
            animation: bounce 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Music = () => (
            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
        );

        const Check = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
            </svg>
        );

        const GuestApp = () => {
            const [partyCode, setPartyCode] = useState('');
            const [isConnected, setIsConnected] = useState(false);
            const [partyData, setPartyData] = useState(null);
            const [songs, setSongs] = useState([]);
            const [votedSongs, setVotedSongs] = useState(new Set());
            const [filter, setFilter] = useState('all');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            // Vérifier si déjà connecté
            useEffect(() => {
                const savedCode = localStorage.getItem('current-party-code');
                if (savedCode) {
                    joinParty(savedCode);
                }
            }, []);

            // Rafraîchir les données toutes les 3 secondes
            useEffect(() => {
                if (!isConnected || !partyCode) return;

                const interval = setInterval(() => {
                    loadPartyData();
                }, 3000);

                return () => clearInterval(interval);
            }, [isConnected, partyCode]);

            const loadPartyData = async () => {
                try {
                    const result = await window.storage.get(`party:${partyCode}`, true);
                    if (result) {
                        const data = JSON.parse(result.value);
                        setPartyData(data);
                        setSongs(data.songs || []);
                    }
                } catch (error) {
                    console.error('Erreur chargement:', error);
                }
            };

            const joinParty = async (code) => {
                setLoading(true);
                setError('');
                
                try {
                    const result = await window.storage.get(`party:${code}`, true);
                    
                    if (!result) {
                        setError('Code de soirée invalide');
                        setLoading(false);
                        return;
                    }

                    const data = JSON.parse(result.value);
                    setPartyData(data);
                    setSongs(data.songs || []);
                    setPartyCode(code);
                    setIsConnected(true);
                    localStorage.setItem('current-party-code', code);

                    // Charger les votes de l'utilisateur
                    const userVotesKey = `user-votes:${code}`;
                    const userVotes = localStorage.getItem(userVotesKey);
                    if (userVotes) {
                        setVotedSongs(new Set(JSON.parse(userVotes)));
                    }
                } catch (error) {
                    setError('Erreur de connexion');
                    console.error(error);
                }
                
                setLoading(false);
            };

            const handleVote = async (songId) => {
                if (votedSongs.has(songId)) return;

                const updatedSongs = songs.map(song => 
                    song.id === songId ? { ...song, votes: song.votes + 1 } : song
                );

                const updatedPartyData = {
                    ...partyData,
                    songs: updatedSongs,
                    totalVotes: (partyData.totalVotes || 0) + 1
                };

                setSongs(updatedSongs);
                setPartyData(updatedPartyData);

                const newVotedSongs = new Set(votedSongs);
                newVotedSongs.add(songId);
                setVotedSongs(newVotedSongs);

                try {
                    await window.storage.set(`party:${partyCode}`, JSON.stringify(updatedPartyData), true);
                    localStorage.setItem(`user-votes:${partyCode}`, JSON.stringify([...newVotedSongs]));
                } catch (error) {
                    console.error('Erreur vote:', error);
                }
            };

            const disconnect = () => {
                setIsConnected(false);
                setPartyCode('');
                setPartyData(null);
                setSongs([]);
                setVotedSongs(new Set());
                localStorage.removeItem('current-party-code');
            };

            const calculateProbability = (votes) => {
                const total = partyData?.totalVotes || 0;
                if (total === 0) return 0;
                return ((votes / total) * 100).toFixed(1);
            };

            const sortedSongs = [...songs].sort((a, b) => b.votes - a.votes);
            const genres = ['all', ...new Set(songs.map(s => s.genre))];
            const filteredSongs = filter === 'all' ? sortedSongs : sortedSongs.filter(s => s.genre === filter);

            // Écran de connexion
            if (!isConnected) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-6">
                        <div className="max-w-md w-full">
                            <div className="text-center mb-8">
                                <div className="inline-flex bg-gradient-to-br from-green-400 to-green-600 p-6 rounded-3xl shadow-2xl mb-6 bounce-anim">
                                    <Music />
                                </div>
                                <h1 className="text-4xl font-black text-white mb-2">DJ Vote</h1>
                                <p className="text-gray-400">Entre le code de la soirée pour voter</p>
                            </div>

                            <div className="bg-gray-900 rounded-2xl p-8 border border-gray-800">
                                <input
                                    type="text"
                                    placeholder="CODE SOIRÉE"
                                    value={partyCode}
                                    onChange={(e) => setPartyCode(e.target.value.toUpperCase())}
                                    className="w-full bg-gray-800 text-white text-center text-2xl font-bold px-6 py-4 rounded-xl border-2 border-gray-700 focus:border-green-500 focus:outline-none mb-4 uppercase tracking-widest"
                                    maxLength="6"
                                />

                                {error && (
                                    <div className="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-lg mb-4 text-sm">
                                        {error}
                                    </div>
                                )}

                                <button
                                    onClick={() => joinParty(partyCode)}
                                    disabled={loading || partyCode.length < 4}
                                    className="w-full bg-green-500 text-black font-bold py-4 rounded-xl hover:bg-green-400 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    {loading ? 'Connexion...' : 'Rejoindre la soirée'}
                                </button>

                                <p className="text-gray-500 text-xs text-center mt-4">
                                    Scanne le QR code ou demande le code au DJ
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // Écran de vote
            return (
                <div className="min-h-screen bg-black">
                    {/* Header */}
                    <div className="bg-gradient-to-b from-green-900 to-black pt-6 pb-4 px-6 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <p className="text-xs text-gray-400 mb-1">Soirée</p>
                                    <h1 className="text-2xl font-black text-white">{partyData?.name || 'DJ Vote'}</h1>
                                </div>
                                <button
                                    onClick={disconnect}
                                    className="bg-gray-800 text-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-700"
                                >
                                    Quitter
                                </button>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-gray-900/50 rounded-lg p-3 border border-gray-800">
                                    <div className="text-xs text-gray-400 mb-1">Total votes</div>
                                    <div className="text-2xl font-bold text-white">{partyData?.totalVotes || 0}</div>
                                </div>
                                <div className="bg-gray-900/50 rounded-lg p-3 border border-gray-800">
                                    <div className="text-xs text-gray-400 mb-1">Tes votes</div>
                                    <div className="text-2xl font-bold text-white">{votedSongs.size}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 pb-12 pt-6">
                        {/* Filtres */}
                        <div className="mb-6 flex flex-wrap gap-2">
                            {genres.map(genre => (
                                <button
                                    key={genre}
                                    onClick={() => setFilter(genre)}
                                    className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${
                                        filter === genre
                                            ? 'bg-green-500 text-black'
                                            : 'bg-gray-900 text-white border border-gray-800'
                                    }`}
                                >
                                    {genre === 'all' ? 'Tous' : genre}
                                </button>
                            ))}
                        </div>

                        {/* Liste des chansons */}
                        <div className="space-y-2">
                            {filteredSongs.map((song, index) => {
                                const probability = calculateProbability(song.votes);
                                const hasVoted = votedSongs.has(song.id);
                                const isTop3 = index < 3;
                                
                                return (
                                    <div
                                        key={song.id}
                                        className={`bg-gray-900/30 rounded-lg p-4 transition-all hover:bg-gray-800/50 ${
                                            isTop3 ? 'border border-green-500/30' : 'border border-gray-900'
                                        }`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className="flex-shrink-0 w-6 text-center">
                                                <div className={`text-sm font-bold ${
                                                    isTop3 ? 'text-green-400' : 'text-gray-500'
                                                }`}>
                                                    {index + 1}
                                                </div>
                                            </div>

                                            <div className={`flex-shrink-0 w-10 h-10 rounded flex items-center justify-center font-bold ${
                                                isTop3 ? 'bg-green-500 text-black' : 'bg-gray-800 text-gray-600'
                                            }`}>
                                                {song.title.charAt(0)}
                                            </div>

                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-sm font-semibold text-white truncate">
                                                    {song.title}
                                                </h3>
                                                <p className="text-xs text-gray-400 truncate">{song.artist}</p>
                                            </div>

                                            <div className="flex items-center gap-3">
                                                <div className="text-right">
                                                    <div className="text-lg font-bold text-white">{song.votes}</div>
                                                    <div className="text-xs text-gray-500">{probability}%</div>
                                                </div>

                                                <button
                                                    onClick={() => handleVote(song.id)}
                                                    disabled={hasVoted}
                                                    className={`px-5 py-2 rounded-full text-sm font-bold transition-all ${
                                                        hasVoted
                                                            ? 'bg-gray-800 text-gray-500 cursor-not-allowed'
                                                            : 'bg-green-500 text-black hover:bg-green-400 active:scale-95'
                                                    }`}
                                                >
                                                    {hasVoted ? <Check /> : 'Vote'}
                                                </button>
                                            </div>
                                        </div>

                                        {song.votes > 0 && (
                                            <div className="mt-3 bg-gray-800 rounded-full h-1 overflow-hidden">
                                                <div
                                                    className="bg-green-500 h-full transition-all duration-700"
                                                    style={{ width: `${Math.min(probability * 2, 100)}%` }}
                                                />
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GuestApp />);
    </script>
</body>
</html>
