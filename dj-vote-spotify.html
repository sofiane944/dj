<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Vote System - Spotify Style</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000000;
        }
        
        /* Animation de pulsation pour les cartes */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(29, 185, 84, 0.3); }
            50% { box-shadow: 0 0 40px rgba(29, 185, 84, 0.6); }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        /* Animation de rotation pour l'icône */
        @keyframes disco-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .disco-ball {
            animation: disco-rotate 10s linear infinite;
        }
        
        /* Animation de rebond */
        @keyframes bounce-small {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bounce-anim {
            animation: bounce-small 2s ease-in-out infinite;
        }
        
        /* Animation de fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* Effet de brillance sur le hover */
        .shine-effect:hover {
            background: linear-gradient(90deg, #1DB954 0%, #1ed760 50%, #1DB954 100%);
            background-size: 200% auto;
            animation: shine 1.5s linear infinite;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #121212;
        }
        ::-webkit-scrollbar-thumb {
            background: #1DB954;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1ed760;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icône musique
        const Music = () => (
            <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
        );

        const Fire = () => (
            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fillRule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clipRule="evenodd" />
            </svg>
        );

        const Check = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
            </svg>
        );

        // Playlist de 50 chansons
        const initialPlaylist = [
            { id: 1, title: "Blinding Lights", artist: "The Weeknd", genre: "Pop" },
            { id: 2, title: "Save Your Tears", artist: "The Weeknd", genre: "Pop" },
            { id: 3, title: "Levitating", artist: "Dua Lipa", genre: "Pop" },
            { id: 4, title: "Heat Waves", artist: "Glass Animals", genre: "Indie" },
            { id: 5, title: "Starboy", artist: "The Weeknd ft. Daft Punk", genre: "R&B" },
            { id: 6, title: "One Dance", artist: "Drake ft. Wizkid", genre: "Hip-Hop" },
            { id: 7, title: "Shape of You", artist: "Ed Sheeran", genre: "Pop" },
            { id: 8, title: "Rockstar", artist: "Post Malone ft. 21 Savage", genre: "Hip-Hop" },
            { id: 9, title: "Closer", artist: "The Chainsmokers ft. Halsey", genre: "EDM" },
            { id: 10, title: "Don't Start Now", artist: "Dua Lipa", genre: "Pop" },
            { id: 11, title: "Watermelon Sugar", artist: "Harry Styles", genre: "Pop" },
            { id: 12, title: "As It Was", artist: "Harry Styles", genre: "Pop" },
            { id: 13, title: "Bad Guy", artist: "Billie Eilish", genre: "Pop" },
            { id: 14, title: "Therefore I Am", artist: "Billie Eilish", genre: "Pop" },
            { id: 15, title: "Peaches", artist: "Justin Bieber ft. Daniel Caesar", genre: "R&B" },
            { id: 16, title: "Stay", artist: "The Kid LAROI & Justin Bieber", genre: "Pop" },
            { id: 17, title: "Good 4 U", artist: "Olivia Rodrigo", genre: "Pop Rock" },
            { id: 18, title: "drivers license", artist: "Olivia Rodrigo", genre: "Pop" },
            { id: 19, title: "Montero", artist: "Lil Nas X", genre: "Hip-Hop" },
            { id: 20, title: "Industry Baby", artist: "Lil Nas X ft. Jack Harlow", genre: "Hip-Hop" },
            { id: 21, title: "Shivers", artist: "Ed Sheeran", genre: "Pop" },
            { id: 22, title: "Bad Habits", artist: "Ed Sheeran", genre: "Pop" },
            { id: 23, title: "Dynamite", artist: "BTS", genre: "K-Pop" },
            { id: 24, title: "Butter", artist: "BTS", genre: "K-Pop" },
            { id: 25, title: "Anti-Hero", artist: "Taylor Swift", genre: "Pop" },
            { id: 26, title: "Karma", artist: "Taylor Swift", genre: "Pop" },
            { id: 27, title: "Flowers", artist: "Miley Cyrus", genre: "Pop" },
            { id: 28, title: "Die For You", artist: "The Weeknd", genre: "R&B" },
            { id: 29, title: "Vampire", artist: "Olivia Rodrigo", genre: "Pop Rock" },
            { id: 30, title: "Cruel Summer", artist: "Taylor Swift", genre: "Pop" },
            { id: 31, title: "Kill Bill", artist: "SZA", genre: "R&B" },
            { id: 32, title: "Snooze", artist: "SZA", genre: "R&B" },
            { id: 33, title: "Unholy", artist: "Sam Smith & Kim Petras", genre: "Pop" },
            { id: 34, title: "Calm Down", artist: "Rema & Selena Gomez", genre: "Afrobeats" },
            { id: 35, title: "Positions", artist: "Ariana Grande", genre: "Pop" },
            { id: 36, title: "Dance The Night", artist: "Dua Lipa", genre: "Pop" },
            { id: 37, title: "Creepin'", artist: "Metro Boomin, The Weeknd", genre: "Hip-Hop" },
            { id: 38, title: "Paint The Town Red", artist: "Doja Cat", genre: "Hip-Hop" },
            { id: 39, title: "Espresso", artist: "Sabrina Carpenter", genre: "Pop" },
            { id: 40, title: "Greedy", artist: "Tate McRae", genre: "Pop" },
            { id: 41, title: "Swim", artist: "Chase Atlantic", genre: "Alt-Pop" },
            { id: 42, title: "We Can't Be Friends", artist: "Ariana Grande", genre: "Pop" },
            { id: 43, title: "Yes, And?", artist: "Ariana Grande", genre: "Pop" },
            { id: 44, title: "Stick Season", artist: "Noah Kahan", genre: "Folk" },
            { id: 45, title: "Lose Control", artist: "Teddy Swims", genre: "Soul" },
            { id: 46, title: "Beautiful Things", artist: "Benson Boone", genre: "Pop" },
            { id: 47, title: "Texas Hold 'Em", artist: "Beyoncé", genre: "Country-Pop" },
            { id: 48, title: "Houdini", artist: "Dua Lipa", genre: "Pop" },
            { id: 49, title: "Too Sweet", artist: "Hozier", genre: "Indie" },
            { id: 50, title: "A Bar Song", artist: "Shaboozey", genre: "Country" }
        ];

        const DJVoteApp = () => {
            const [songs, setSongs] = useState([]);
            const [votedSongs, setVotedSongs] = useState(new Set());
            const [totalVotes, setTotalVotes] = useState(0);
            const [filter, setFilter] = useState('all');

            useEffect(() => {
                const storedSongs = localStorage.getItem('dj-songs-spotify');
                const storedVotes = localStorage.getItem('user-votes-spotify');
                
                if (storedSongs) {
                    const parsedSongs = JSON.parse(storedSongs);
                    setSongs(parsedSongs);
                    const total = parsedSongs.reduce((sum, song) => sum + song.votes, 0);
                    setTotalVotes(total);
                } else {
                    const songsWithVotes = initialPlaylist.map(song => ({ ...song, votes: 0 }));
                    setSongs(songsWithVotes);
                    localStorage.setItem('dj-songs-spotify', JSON.stringify(songsWithVotes));
                }

                if (storedVotes) {
                    setVotedSongs(new Set(JSON.parse(storedVotes)));
                }
            }, []);

            const handleVote = (songId) => {
                if (votedSongs.has(songId)) return;

                const updatedSongs = songs.map(song => 
                    song.id === songId ? { ...song, votes: song.votes + 1 } : song
                );
                
                const newTotalVotes = totalVotes + 1;
                setSongs(updatedSongs);
                setTotalVotes(newTotalVotes);

                const newVotedSongs = new Set(votedSongs);
                newVotedSongs.add(songId);
                setVotedSongs(newVotedSongs);

                localStorage.setItem('dj-songs-spotify', JSON.stringify(updatedSongs));
                localStorage.setItem('user-votes-spotify', JSON.stringify([...newVotedSongs]));
            };

            const calculateProbability = (votes) => {
                if (totalVotes === 0) return 0;
                return ((votes / totalVotes) * 100).toFixed(1);
            };

            const sortedSongs = [...songs].sort((a, b) => b.votes - a.votes);
            const genres = ['all', ...new Set(initialPlaylist.map(s => s.genre))];
            const filteredSongs = filter === 'all' ? sortedSongs : sortedSongs.filter(s => s.genre === filter);

            return (
                <div className="min-h-screen bg-black">
                    {/* Header style Spotify */}
                    <div className="bg-gradient-to-b from-green-900 to-black pt-8 pb-6 px-6 mb-6">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex items-center gap-5 mb-6">
                                <div className="bg-gradient-to-br from-green-400 to-green-600 p-4 rounded-2xl shadow-2xl disco-ball">
                                    <Music />
                                </div>
                                <div>
                                    <p className="text-xs text-gray-300 uppercase tracking-widest font-semibold mb-1">Playlist</p>
                                    <h1 className="text-5xl md:text-6xl font-black text-white mb-2">
                                        DJ Vote
                                    </h1>
                                    <p className="text-gray-300 text-sm">Vote pour tes morceaux préférés • {totalVotes} votes</p>
                                </div>
                            </div>

                            {/* Stats style Spotify */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
                                <div className="bg-gray-900/50 backdrop-blur-sm rounded-lg p-5 border border-gray-800 hover:bg-gray-800/50 transition-all bounce-anim">
                                    <div className="flex items-center gap-2 text-gray-400 text-xs uppercase tracking-wider mb-2">
                                        <Fire />
                                        <span>Total votes</span>
                                    </div>
                                    <div className="text-4xl font-black text-white">{totalVotes}</div>
                                </div>
                                
                                <div className="bg-gray-900/50 backdrop-blur-sm rounded-lg p-5 border border-gray-800 hover:bg-gray-800/50 transition-all">
                                    <div className="text-gray-400 text-xs uppercase tracking-wider mb-2">Top morceau</div>
                                    <div className="text-xl font-bold text-white truncate">{sortedSongs[0]?.title || 'Aucun'}</div>
                                    <div className="text-sm text-gray-400 truncate">{sortedSongs[0]?.artist || ''}</div>
                                </div>
                                
                                <div className="bg-gray-900/50 backdrop-blur-sm rounded-lg p-5 border border-gray-800 hover:bg-gray-800/50 transition-all bounce-anim" style={{animationDelay: '0.5s'}}>
                                    <div className="text-gray-400 text-xs uppercase tracking-wider mb-2">Tes votes</div>
                                    <div className="text-4xl font-black text-white">{votedSongs.size}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 pb-12">
                        {/* Filtres style Spotify */}
                        <div className="mb-8 flex flex-wrap gap-2">
                            {genres.map(genre => (
                                <button
                                    key={genre}
                                    onClick={() => setFilter(genre)}
                                    className={`px-5 py-2 rounded-full text-sm font-semibold transition-all ${
                                        filter === genre
                                            ? 'bg-green-500 text-black hover:bg-green-400'
                                            : 'bg-gray-900 text-white hover:bg-gray-800 border border-gray-800'
                                    }`}
                                >
                                    {genre === 'all' ? 'Tous' : genre}
                                </button>
                            ))}
                        </div>

                        {/* Liste des chansons style Spotify */}
                        <div className="space-y-2">
                            {filteredSongs.map((song, index) => {
                                const probability = calculateProbability(song.votes);
                                const hasVoted = votedSongs.has(song.id);
                                const isTop3 = index < 3;
                                
                                return (
                                    <div
                                        key={song.id}
                                        className={`bg-gray-900/30 rounded-lg p-4 transition-all hover:bg-gray-800/50 group fade-in ${
                                            isTop3 ? 'pulse-glow border border-green-500/30' : 'border border-gray-900'
                                        }`}
                                        style={{animationDelay: `${index * 0.05}s`}}
                                    >
                                        <div className="flex items-center gap-4">
                                            {/* Numéro */}
                                            <div className="flex-shrink-0 w-8 text-center">
                                                <div className={`text-base font-bold ${
                                                    index === 0 ? 'text-green-400' :
                                                    index === 1 ? 'text-green-500' :
                                                    index === 2 ? 'text-green-600' :
                                                    'text-gray-500'
                                                }`}>
                                                    {index + 1}
                                                </div>
                                            </div>

                                            {/* Avatar / Pochette simulée */}
                                            <div className={`flex-shrink-0 w-12 h-12 rounded flex items-center justify-center font-black text-lg ${
                                                isTop3 ? 'bg-green-500 text-black' : 'bg-gray-800 text-gray-600'
                                            }`}>
                                                {song.title.charAt(0)}
                                            </div>

                                            {/* Info chanson */}
                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-base font-semibold text-white truncate group-hover:text-green-400 transition-colors">
                                                    {song.title}
                                                </h3>
                                                <p className="text-sm text-gray-400 truncate">{song.artist}</p>
                                            </div>

                                            {/* Genre badge */}
                                            <div className="hidden md:block">
                                                <span className="px-3 py-1 bg-gray-800/50 text-gray-400 text-xs rounded-full border border-gray-700">
                                                    {song.genre}
                                                </span>
                                            </div>

                                            {/* Stats */}
                                            <div className="flex items-center gap-4">
                                                <div className="text-right">
                                                    <div className="text-xl font-bold text-white">{song.votes}</div>
                                                    <div className="text-xs text-gray-500">{probability}%</div>
                                                </div>

                                                {/* Bouton vote */}
                                                <button
                                                    onClick={() => handleVote(song.id)}
                                                    disabled={hasVoted}
                                                    className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all ${
                                                        hasVoted
                                                            ? 'bg-gray-800 text-gray-500 cursor-not-allowed border border-gray-700'
                                                            : 'bg-green-500 text-black hover:bg-green-400 hover:scale-105 active:scale-95 shine-effect'
                                                    }`}
                                                >
                                                    {hasVoted ? (
                                                        <div className="flex items-center gap-1.5">
                                                            <Check />
                                                            <span>Voté</span>
                                                        </div>
                                                    ) : (
                                                        'Vote'
                                                    )}
                                                </button>
                                            </div>
                                        </div>

                                        {/* Barre de progression */}
                                        {song.votes > 0 && (
                                            <div className="mt-3 bg-gray-800 rounded-full h-1 overflow-hidden">
                                                <div
                                                    className="bg-green-500 h-full transition-all duration-700 ease-out"
                                                    style={{ width: `${Math.min(probability * 2, 100)}%` }}
                                                />
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Footer */}
                        <div className="mt-12 text-center border-t border-gray-900 pt-8">
                            <p className="text-gray-500 text-sm">
                                Les morceaux avec le plus de votes ont plus de chances d'être joués
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DJVoteApp />);
    </script>
</body>
</html>
